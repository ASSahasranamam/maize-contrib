# Test configuration for maize

# Various options
scratch = "/tmp"
packages = [
    "maize.steps.mai"
]

# Default batch system options
[batch]
system = "local"
walltime = "24:00:00"

# Step-specific settings
[vina]
commands.vina = "./autodock_vina_1_1_2_linux_x86/bin/vina"

[vinascore]
commands.vina = "./autodock_vina_1_1_2_linux_x86/bin/vina"

[autodockgpu]
python = "/home/{user}/anaconda3/envs/maize-dev/bin/python"
modules = ["CUDA", "GCC"]
commands.autodock_gpu = "/home/{user}/REINVENT4/adgpu-v1.6_linux_x64_cuda12_128wi"

[gypsum]
scripts.gypsum.interpreter = "home/{user}/anaconda3/envs/gypsum_dl_env/bin/python"
scripts.gypsum.location = "home/{user}/anaconda3/envs/gypsum_dl_env/bin/gypsum-dl"

# Install Reinvent
